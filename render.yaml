services:
  - type: web
    name: rag-doc-api
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false       # Set this manually in Render dashboard
    disk:
      name: vectorstore
      mountPath: /opt/render/project/src/vectorstore
      sizeGB: 1
